<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Income & Expense Calculator</title>
  <link rel="stylesheet" href="style.css">
  
</head>
<body>
  <div class="container">
    <h1>Income & Expense Calculator</h1>

    <!-- Overview -->
    <div class="overview">
      <div>Total Income: $<span id="total-income">0</span></div>
      <div>Total Expenses: $<span id="total-expense">0</span></div>
      <div>Net Balance: $<span id="net-balance">0</span></div>
    </div>

    <!-- Input Form -->
    <div class="input-form">
      <input type="text" id="description" placeholder="Description">
      <input type="number" id="amount" placeholder="Amount">
      <select id="type">
        <option value="income">Income</option>
        <option value="expense">Expense</option>
        
      </select>
      <button id="add-btn">Add Entry</button>
      <button id="reset-btn">Reset</button>
      
    </div>

    <!-- Filters -->
    <div class="filters">
      <label><input type="radio" name="filter" value="all" checked> All</label>
      <label><input type="radio" name="filter" value="income"> Income</label>
      <label><input type="radio" name="filter" value="expense"> Expense</label>
    </div>

    <!-- Entry List -->
    <ul id="entry-list"></ul>
  </div>

</body><script src="script.js"></script>

</html>
